<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#009b13;
min-height:100vh;
}

.header{
height:120px;
background:#000;
}

.container{
max-width:550px;
margin:auto;
padding:0 20px 40px;
}

.logo{
width:140px;
height:140px;
margin:-70px auto 20px;
background:#fff;
border-radius:50%;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
text-align:center;
color:#fff;
font-size:2rem;
font-weight:700;
margin-bottom:30px;
}

.card{
background:#f3f3f3;
border-radius:25px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.card h2{
text-align:center;
margin-bottom:20px;
font-size:1.8rem;
color:#111;
}

.social{
display:flex;
justify-content:space-between;
align-items:center;
text-decoration:none;
background:#fff;
padding:18px;
margin-bottom:15px;
border-radius:18px;
color:#111;
transition:.3s;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.social:hover{
transform:translateY(-3px);
}

.left{
display:flex;
align-items:center;
gap:18px;
}

.left i{
font-size:38px;
width:45px;
text-align:center;
}

.left span{
font-size:19px;
font-weight:500;
}

.arrow{
font-size:20px;
color:#009b13;
}

.facebook i{
color:#1877F2;
}

.instagram i{
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.x i{
color:#000;
}

.snapchat i{
color:#FFD400;
}

.tiktok i{
color:#111;
}

.youtube i{
color:#ff0000;
}

.whatsapp i{
color:#25D366;
}

.email i{
color:#666;
}

@media(max-width:600px){

.logo{
width:120px;
height:120px;
}

.title{
font-size:1.7rem;
}

.card{
padding:20px;
}

.left span{
font-size:17px;
}

.left i{
font-size:34px;
}

}

</style>
